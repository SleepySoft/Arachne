schema: arachne-flow/v0.1
note: Standalone product flows for the semiconductor industry. Each file traces one
  product from raw materials and processes to the final product. Process/usage nodes
  from the legacy graph become arachne-flow METHODs; each METHOD occurrence gets a
  unique ACTION with a [ref] triple. Shared upstream chains (chip design, silicon
  wafer manufacturing, wafer fabrication, PCB fabrication, power semiconductor) are
  extracted into dedicated flow files that product flows include rather than duplicate.
